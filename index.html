<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Angham Choir Song Manager</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f5f7;
        --card: #ffffff;
        --primary: #1f3bff;
        --primary-dark: #182bbd;
        --text: #111318;
        --muted: #6b7280;
        --border: #e5e7eb;
        --danger: #c81e1e;
        --success: #0f9d58;
        --shadow: 0 10px 30px rgba(15, 18, 28, 0.08);
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, var(--bg) 0%, #eef1f6 100%);
        color: var(--text);
      }

      header {
        padding: 24px 28px 8px;
      }

      header h1 {
        margin: 0;
        font-size: 22px;
      }

      header p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
      }

      main {
        padding: 16px 24px 40px;
      }

      .view {
        display: none;
      }

      .view.active {
        display: block;
      }

      .status {
        margin: 0 24px 16px;
        padding: 12px 16px;
        border-radius: 10px;
        display: none;
        font-size: 14px;
      }

      .status.error {
        background: #ffecec;
        color: #9f1c1c;
        border: 1px solid #f5b5b5;
      }

      .status.success {
        background: #e6f6ef;
        color: #0f5f3b;
        border: 1px solid #bce3cf;
      }

      .dashboard-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }

      .panel {
        background: var(--card);
        border-radius: 16px;
        border: 1px solid var(--border);
        padding: 16px;
        box-shadow: var(--shadow);
      }

      input,
      textarea,
      select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        font-size: 14px;
        font-family: inherit;
      }

      textarea {
        min-height: 80px;
        resize: vertical;
      }

      .tiles {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .tile {
        padding: 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--card);
        cursor: pointer;
        transition: border-color 0.2s ease, transform 0.2s ease;
      }

      .tile:hover {
        border-color: var(--primary);
        transform: translateY(-2px);
      }

      .tile h4 {
        margin: 0 0 6px;
        font-size: 15px;
      }

      .tile span {
        font-size: 12px;
        color: var(--muted);
      }

      .song-page {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .song-page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .song-page-header h2 {
        margin: 0;
        font-size: 22px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--card);
        cursor: pointer;
      }

      .icon-btn svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }

      .detail-card {
        background: #f9fafb;
        border-radius: 12px;
        padding: 10px 12px;
        border: 1px solid var(--border);
      }

      .detail-card label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 6px;
      }

      .audio-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .audio-item {
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #fdfdfd;
      }

      .audio-item h5 {
        margin: 0 0 8px;
        font-size: 14px;
      }

      .audio-item audio {
        width: 100%;
      }

      .admin-actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        padding: 10px 14px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        font-weight: 600;
      }

      .btn.primary {
        background: var(--primary);
        color: #fff;
      }

      .btn.primary:hover {
        background: var(--primary-dark);
      }

      .btn.ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }

      .btn.danger {
        background: #fbe9e9;
        color: var(--danger);
        border: 1px solid #f2b5b5;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 12px;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .form-group label {
        font-size: 12px;
        color: var(--muted);
      }

      .section-title {
        margin-top: 0;
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      .hidden {
        display: none;
      }

      .modal {
        position: fixed;
        inset: 0;
        background: rgba(15, 18, 28, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .modal.hidden {
        display: none;
      }

      .modal-card {
        background: var(--card);
        width: min(720px, 100%);
        border-radius: 18px;
        border: 1px solid var(--border);
        padding: 20px;
        box-shadow: var(--shadow);
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .modal-header h3 {
        margin: 0;
      }

      @media (max-width: 900px) {
        body {
          font-size: 15px;
        }

        header {
          padding: 18px 18px 8px;
        }

        main {
          padding: 16px 18px 32px;
        }

        .panel {
          padding: 14px;
        }

        .dashboard-bar {
          flex-direction: column;
          align-items: stretch;
        }

        .icon-btn {
          width: 42px;
          height: 42px;
        }

        .song-page-header {
          flex-direction: column;
          align-items: flex-start;
        }

        .audio-item audio {
          height: 44px;
        }

        .admin-actions {
          width: 100%;
        }

        .admin-actions .btn {
          flex: 1 1 140px;
          min-height: 42px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Angham Choir</h1>
      <p>Search, organize, and listen to choir songs.</p>
    </header>
    <div id="status" class="status"></div>

    <main>
      <section id="dashboard" class="view active">
        <div class="panel">
          <div class="dashboard-bar">
            <input
              type="text"
              id="searchInput"
              placeholder="Search by name or key (scale)..."
            />
            <button class="icon-btn" id="addSongBtn" aria-label="Add song">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M11 5h2v14h-2zM5 11h14v2H5z"
                />
              </svg>
            </button>
          </div>
          <div id="songTiles" class="tiles"></div>
        </div>
      </section>

      <section id="songPage" class="view">
        <div class="panel song-page">
          <div class="song-page-header">
            <div class="header-actions">
              <button class="btn ghost" id="backToDashboard">Back</button>
            </div>
            <h2 id="songTitle">Song</h2>
            <div class="header-actions">
              <button class="icon-btn" id="editSongBtn" aria-label="Edit song">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"
                  />
                </svg>
              </button>
              <button class="icon-btn" id="deleteSongBtn" aria-label="Delete song">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M6 7h12l-1 14H7L6 7zm3-3h6l1 2H8l1-2z"
                  />
                </svg>
              </button>
            </div>
          </div>
          <div id="songDetails" class="song-details"></div>
          <div class="detail-card" style="margin-top: 12px;">
            <label>Audio Tracks</label>
            <div id="libraryAudioList" class="audio-list"></div>
            <div class="form-group" style="margin-top: 12px;">
              <input type="file" id="audioFiles" multiple accept="audio/*" />
            </div>
            <div class="admin-actions">
              <button class="btn primary" id="uploadAudioBtn">
                Upload Audio
              </button>
            </div>
          </div>
          <div class="detail-card" style="margin-top: 12px;">
            <label>Photos</label>
            <div class="muted">No photos yet.</div>
          </div>
        </div>
      </section>
    </main>

    <div id="songFormModal" class="modal hidden" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-header">
          <h3 id="formTitle">Add New Song</h3>
          <button class="icon-btn" id="modalClose" aria-label="Close">✕</button>
        </div>
        <form id="songForm">
          <div class="form-group">
            <label for="songName">Song Name *</label>
            <input id="songName" required />
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label for="songKey">Key (Scale)</label>
              <input id="songKey" />
            </div>
            <div class="form-group">
              <label for="songBpm">BPM</label>
              <input id="songBpm" type="number" min="0" />
            </div>
            <div class="form-group">
              <label for="songRhythm">Rhythm</label>
              <input id="songRhythm" />
            </div>
            <div class="form-group">
              <label for="songStructure">Structure</label>
              <input id="songStructure" />
            </div>
          </div>
          <div class="form-group">
            <label for="songLyrics">Lyrics</label>
            <textarea id="songLyrics"></textarea>
          </div>
          <div class="form-group">
            <label for="songNotes">Notes</label>
            <textarea id="songNotes"></textarea>
          </div>
          <div class="admin-actions">
            <button class="btn primary" type="submit">Save</button>
            <button class="btn ghost" type="button" id="formCancel">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const SUPABASE_URL = "https://buomipedlddbrutjxefm.supabase.co";
      const SUPABASE_ANON_KEY =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ1b21pcGVkbGRkYnJ1dGp4ZWZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MTYzODksImV4cCI6MjA5NTI5MjM4OX0.OiE5lLQ5N939H2dlgZQIvPjjgQg7UQUwS-mcHwVn2fw";
      const BUCKET_NAME = "audio";
      const MAX_AUDIO_MB = 5;
      const MAX_AUDIO_BYTES = MAX_AUDIO_MB * 1024 * 1024;
      const FALLBACK_FILENAME = "audio";
      const UUID_PREFIX_REGEX = /^[a-f0-9-]{36}-/i;
      const UUID_REGEX =
        /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
      const ALLOWED_EXTENSIONS = ["mp3", "wav", "m4a", "aac", "ogg", "flac"];
      const MIME_EXTENSION_MAP = {
        "audio/mpeg": "mp3",
        "audio/wav": "wav",
        "audio/x-wav": "wav",
        "audio/mp4": "m4a",
        "audio/aac": "aac",
        "audio/ogg": "ogg",
        "audio/flac": "flac",
      };
      const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const statusEl = document.getElementById("status");
      const dashboardSection = document.getElementById("dashboard");
      const songPageSection = document.getElementById("songPage");
      const songTilesEl = document.getElementById("songTiles");
      const songDetailsEl = document.getElementById("songDetails");
      const songTitleEl = document.getElementById("songTitle");
      const searchInput = document.getElementById("searchInput");
      const addSongBtn = document.getElementById("addSongBtn");
      const backToDashboard = document.getElementById("backToDashboard");
      const editSongBtn = document.getElementById("editSongBtn");
      const deleteSongBtn = document.getElementById("deleteSongBtn");
      const songFormModal = document.getElementById("songFormModal");
      const modalClose = document.getElementById("modalClose");
      const songForm = document.getElementById("songForm");
      const formTitle = document.getElementById("formTitle");
      const formCancel = document.getElementById("formCancel");
      const audioFiles = document.getElementById("audioFiles");
      const uploadAudioBtn = document.getElementById("uploadAudioBtn");
      const libraryAudioList = document.getElementById("libraryAudioList");

      const formFields = {
        name: document.getElementById("songName"),
        key: document.getElementById("songKey"),
        bpm: document.getElementById("songBpm"),
        rhythm: document.getElementById("songRhythm"),
        structure: document.getElementById("songStructure"),
        lyrics: document.getElementById("songLyrics"),
        notes: document.getElementById("songNotes"),
      };

      let songsCache = [];
      let allSongsCache = [];
      let selectedSongId = null;
      let editingSongId = null;
      let searchTimer = null;
      const audioCache = {};

      function setStatus(message, type = "success") {
        if (!message) {
          statusEl.style.display = "none";
          statusEl.textContent = "";
          statusEl.className = "status";
          return;
        }
        statusEl.textContent = message;
        statusEl.className = `status ${type}`;
        statusEl.style.display = "block";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showDashboard() {
        dashboardSection.classList.add("active");
        songPageSection.classList.remove("active");
      }

      function showSongPage() {
        dashboardSection.classList.remove("active");
        songPageSection.classList.add("active");
      }

      async function fetchSongs() {
        let request = client.from("songs").select("*").order("name");
        const { data, error } = await request;
        if (error) {
          setStatus(`Failed to load songs: ${error.message}`, "error");
          return [];
        }
        return data || [];
      }

      function renderSongTiles() {
        songTilesEl.innerHTML = "";
        if (!songsCache.length) {
          songTilesEl.innerHTML =
            '<p class="muted">No songs yet. Tap + to add your first one.</p>';
          return;
        }
        songsCache.forEach((song) => {
          const tile = document.createElement("div");
          tile.className = "tile";
          tile.innerHTML = `<h4>${song.name}</h4><span>${
            song.key || "No key"
          }</span>`;
          tile.addEventListener("click", () => showSongDetails(song.id));
          songTilesEl.appendChild(tile);
        });
      }

      async function showSongDetails(songId) {
        selectedSongId = songId;
        const song = songsCache.find((item) => item.id === songId);
        if (!song) return;
        songTitleEl.textContent = song.name || "Song";
        showSongPage();
        songDetailsEl.innerHTML = `
          <div class="detail-grid">
            <div class="detail-card"><label>Key</label>${
              song.key || "—"
            }</div>
            <div class="detail-card"><label>BPM</label>${
              song.bpm || "—"
            }</div>
            <div class="detail-card"><label>Rhythm</label>${
              song.rhythm || "—"
            }</div>
            <div class="detail-card"><label>Structure</label>${
              song.structure || "—"
            }</div>
          </div>
          <div class="detail-card" style="margin-top:12px;">
            <label>Lyrics</label>
            <div>${song.lyrics ? song.lyrics.replace(/\n/g, "<br>") : "—"}</div>
          </div>
          <div class="detail-card" style="margin-top:12px;">
            <label>Notes</label>
            <div>${song.notes ? song.notes.replace(/\n/g, "<br>") : "—"}</div>
          </div>
          <div class="detail-card" style="margin-top:12px;">
            <label>Photos</label>
            <div class="muted">No photos yet.</div>
          </div>
          <div class="detail-card" style="margin-top:12px;">
            <label>Audio Tracks</label>
            <div id="libraryAudioList" class="audio-list"></div>
          </div>
        `;

        const audioList = document.getElementById("libraryAudioList");
        audioList.innerHTML = '<p class="muted">Loading audio...</p>';
        const { data, error } = await client
          .from("audio_tracks")
          .select("*")
          .eq("song_id", songId)
          .order("created_at");
        if (error) {
          audioList.innerHTML = `<p class="muted">Error: ${error.message}</p>`;
          return;
        }
        audioCache[songId] = data || [];
        if (!data || !data.length) {
          audioList.innerHTML = '<p class="muted">No audio tracks yet.</p>';
          return;
        }
        audioList.innerHTML = "";
        data.forEach((track) => {
          const audioItem = document.createElement("div");
          audioItem.className = "audio-item";
          audioItem.innerHTML = `
            <h5>${getTrackDisplayName(track)}</h5>
            <audio controls preload="none" src="${track.url}"></audio>
          `;
          audioList.appendChild(audioItem);
        });

        songPageSection.scrollIntoView({ behavior: "smooth" });
      }

      function applySearchFilter(query = "") {
        const normalized = query.trim().toLowerCase();
        songsCache = normalized
          ? allSongsCache.filter((song) => {
              const name = (song.name || "").toLowerCase();
              const key = (song.key || "").toLowerCase();
              return name.includes(normalized) || key.includes(normalized);
            })
          : [...allSongsCache];
        renderSongTiles();
        if (selectedSongId && !songsCache.some((song) => song.id === selectedSongId)) {
          showDashboard();
          selectedSongId = null;
        }
      }

      async function loadSongs() {
        allSongsCache = await fetchSongs();
        applySearchFilter(searchInput.value);
      }

      function openSongFormModal() {
        songFormModal.classList.remove("hidden");
        songFormModal.setAttribute("aria-hidden", "false");
      }

      function closeSongFormModal() {
        songFormModal.classList.add("hidden");
        songFormModal.setAttribute("aria-hidden", "true");
      }

      function resetForm() {
        editingSongId = null;
        formTitle.textContent = "Add New Song";
        songForm.reset();
        closeSongFormModal();
      }

      function populateForm(song) {
        editingSongId = song.id;
        formTitle.textContent = `Edit Song: ${song.name}`;
        formFields.name.value = song.name || "";
        formFields.key.value = song.key || "";
        formFields.bpm.value = song.bpm || "";
        formFields.rhythm.value = song.rhythm || "";
        formFields.structure.value = song.structure || "";
        formFields.lyrics.value = song.lyrics || "";
        formFields.notes.value = song.notes || "";
        openSongFormModal();
      }

      async function deleteSong(song) {
        if (!confirm(`Delete "${song.name}" and all its audio tracks?`)) {
          return;
        }
        setStatus("Deleting song...");
        const { error } = await client.from("songs").delete().eq("id", song.id);
        if (error) {
          setStatus(`Failed to delete song: ${error.message}`, "error");
          return;
        }
        if (editingSongId === song.id) {
          resetForm();
        }
        setStatus("Song deleted.");
        loadSongs();
        showDashboard();
      }

      async function loadAdminAudio(songId) {
        adminAudioList.innerHTML = '<p class="muted">Loading audio...</p>';
        const { data, error } = await client
          .from("audio_tracks")
          .select("*")
          .eq("song_id", songId)
          .order("created_at");
        if (error) {
          adminAudioList.innerHTML = `<p class="muted">Error: ${error.message}</p>`;
          return;
        }
        if (!data || !data.length) {
          adminAudioList.innerHTML = '<p class="muted">No audio yet.</p>';
          return;
        }
        adminAudioList.innerHTML = "";
        data.forEach((track) => {
          const item = document.createElement("div");
          item.className = "audio-item";
          item.innerHTML = `
            <h5>${getTrackDisplayName(track)}</h5>
            <audio controls preload="none" src="${track.url}"></audio>
            <div class="admin-actions" style="margin-top:8px;">
              <button class="btn danger" data-action="remove">Remove</button>
            </div>
          `;
          item
            .querySelector('[data-action="remove"]')
            .addEventListener("click", () => deleteTrack(track));
          adminAudioList.appendChild(item);
        });
      }

      function getTrackDisplayName(track) {
        if (!track?.name) return "Audio track";
        const parts = track.name.split("/");
        const fileName = parts[parts.length - 1];
        return fileName.replace(UUID_PREFIX_REGEX, "");
      }

      async function deleteTrack(track) {
        if (!confirm("Delete this audio track?")) return;
        setStatus("Removing audio...");
        const storageResult = await client.storage
          .from(BUCKET_NAME)
          .remove([track.name]);
        if (storageResult.error) {
          setStatus(
            `Storage remove failed: ${storageResult.error.message}`,
            "error"
          );
          return;
        }
        const { error } = await client
          .from("audio_tracks")
          .delete()
          .eq("id", track.id);
        if (error) {
          setStatus(`Failed to delete track: ${error.message}`, "error");
          return;
        }
        setStatus("Audio track removed.");
        loadAdminAudio(editingSongId);
        if (selectedSongId === editingSongId) {
          showSongDetails(selectedSongId);
        }
      }

      function createPayload() {
        const bpmValue = formFields.bpm.value.trim();
        return {
          name: formFields.name.value.trim(),
          key: formFields.key.value.trim() || null,
          bpm: bpmValue ? Number(bpmValue) : null,
          rhythm: formFields.rhythm.value.trim() || null,
          structure: formFields.structure.value.trim() || null,
          lyrics: formFields.lyrics.value.trim() || null,
          notes: formFields.notes.value.trim() || null,
        };
      }

      function safeFileName(file) {
        const baseName = file.name
          .replace(/[^a-zA-Z0-9_-]+/g, "_")
          .replace(/^_+/, "")
          .replace(/_+$/, "");
        const extensionFromType = MIME_EXTENSION_MAP[file.type] || "";
        const extensionFromName = file.name.split(".").pop() || "";
        const extensionCandidate = (extensionFromType || extensionFromName || "")
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "");
        const extension = ALLOWED_EXTENSIONS.includes(extensionCandidate)
          ? extensionCandidate
          : FALLBACK_FILENAME;
        const safeBaseName = baseName || FALLBACK_FILENAME;
        return `${safeBaseName}.${extension}`;
      }

      function isValidUuid(value) {
        return UUID_REGEX.test(value || "");
      }

      function isLikelyAudioFile(file) {
        const extension = (file.name.split(".").pop() || "").toLowerCase();
        const hasAllowedExtension = ALLOWED_EXTENSIONS.includes(extension);
        if (file.type) {
          return file.type.startsWith("audio/") && hasAllowedExtension;
        }
        return hasAllowedExtension;
      }

      function hasPathTraversal(value) {
        return value.includes("..") || value.includes("/") || value.includes("\\");
      }

      async function uploadAudioFiles() {
        if (!editingSongId) {
          setStatus("Select a song to upload audio.", "error");
          return;
        }
        if (!isValidUuid(editingSongId)) {
          setStatus("Invalid song ID for upload.", "error");
          return;
        }
        if (!audioFiles.files.length) {
          setStatus("Choose audio files to upload.", "error");
          return;
        }
        setStatus("Uploading audio...");
        const files = Array.from(audioFiles.files);
        for (const file of files) {
          if (hasPathTraversal(file.name)) {
            setStatus(`"${file.name}" has an invalid filename.`, "error");
            return;
          }
          if (!isLikelyAudioFile(file)) {
            setStatus(`"${file.name}" is not an audio file.`, "error");
            return;
          }
          if (file.size > MAX_AUDIO_BYTES) {
            setStatus(
              `"${file.name}" is larger than ${MAX_AUDIO_MB} MB.`,
              "error"
            );
            return;
          }
        }

        for (const file of files) {
          const uniqueName = `${editingSongId}/${crypto.randomUUID()}-${safeFileName(
            file
          )}`;
          const { error: uploadError } = await client.storage
            .from(BUCKET_NAME)
            .upload(uniqueName, file, { upsert: false });
          if (uploadError) {
            setStatus(`Upload failed: ${uploadError.message}`, "error");
            return;
          }
          const { data: publicData } = client.storage
            .from(BUCKET_NAME)
            .getPublicUrl(uniqueName);
          const { error: insertError } = await client
            .from("audio_tracks")
            .insert({
              song_id: editingSongId,
              name: uniqueName,
              url: publicData.publicUrl,
            });
          if (insertError) {
            if (insertError.message.toLowerCase().includes("row-level security")) {
              setStatus(
                "Upload failed: audio_tracks insert blocked by RLS. Add a policy with WITH CHECK (true) for inserts on audio_tracks.",
                "error"
              );
            } else {
              setStatus(`DB insert failed: ${insertError.message}`, "error");
            }
            return;
          }
        }
        audioFiles.value = "";
        setStatus("Audio uploaded.");
        loadAdminAudio(editingSongId);
        if (selectedSongId === editingSongId) {
          showSongDetails(selectedSongId);
        }
      }

      document.querySelectorAll("nav button").forEach((button) => {
        button.addEventListener("click", () => {
          setActiveTab(button.dataset.tab);
        });
      });

      searchInput.addEventListener("input", (event) => {
        clearTimeout(searchTimer);
        const value = event.target.value.trim();
        searchTimer = setTimeout(() => applySearchFilter(value), 300);
      });

      pinSubmit.addEventListener("click", () => {
        ensurePin();
        const storedPin = localStorage.getItem(PIN_STORAGE_KEY) || DEFAULT_PIN;
        if (pinInput.value === storedPin) {
          sessionStorage.setItem(ADMIN_UNLOCK_KEY, "true");
          pinInput.value = "";
          pinError.textContent = "";
          updateAdminVisibility();
          resetForm();
          setStatus("Admin unlocked.");
        } else {
          pinError.textContent = "Incorrect PIN.";
        }
      });

      songForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const payload = createPayload();
        if (!payload.name) {
          setStatus("Song name is required.", "error");
          return;
        }
        setStatus("Saving...");
        if (editingSongId) {
          const { error } = await client
            .from("songs")
            .update(payload)
            .eq("id", editingSongId);
          if (error) {
            setStatus(`Update failed: ${error.message}`, "error");
            return;
          }
          setStatus("Song updated.");
        } else {
          const { data, error } = await client
            .from("songs")
            .insert(payload)
            .select()
            .single();
          if (error) {
            setStatus(`Create failed: ${error.message}`, "error");
            return;
          }
          editingSongId = data.id;
          formTitle.textContent = `Edit Song: ${data.name}`;
          audioSection.classList.remove("hidden");
          setStatus("Song created. You can now upload audio.");
        }
        loadSongs();
      });

      formCancel.addEventListener("click", () => {
        resetForm();
      });

      uploadAudioBtn.addEventListener("click", uploadAudioFiles);

      addSongBtn.addEventListener("click", () => {
        resetForm();
        openAdminModal();
      });

      modalClose.addEventListener("click", closeAdminModal);

      backToDashboard.addEventListener("click", () => {
        showDashboard();
      });

      editSongBtn.addEventListener("click", () => {
        if (!selectedSongId) return;
        const song = allSongsCache.find((item) => item.id === selectedSongId);
        if (!song) return;
        populateForm(song);
        openAdminModal();
      });

      deleteSongBtn.addEventListener("click", () => {
        if (!selectedSongId) return;
        const song = allSongsCache.find((item) => item.id === selectedSongId);
        if (!song) return;
        deleteSong(song);
      });

      ensurePin();
      updateAdminVisibility();
      loadSongs();
    </script>
  </body>
</html>
